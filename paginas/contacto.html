<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechForge Hub | El centro del Hardware</title>
    <link rel="stylesheet" href="../scss/style.css">
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">
            <a href="/index.html">TechForge<span>Hub</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="componentes.html">Hardware</a></li>
            <li><a href="monitores.html">Setups</a></li>
            <li><a href="rendimientos.html">Optimización</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>
</header>

    <main>
        <section class="page-header">
            <h1>¿Tenés dudas? <span>Escribinos</span></h1>
        </section>

        <section class="form-section">
            <form action="#" class="contacto-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="email@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="interes">¿Qué hardware te interesa?</label>
                    <select id="interes" name="interes">
                        <option value="gpu">Tarjetas Gráficas</option>
                        <option value="cpu">Procesadores</option>
                        <option value="setups">Monitores/Setups</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mensaje">Tu consulta</label>
                    <textarea id="mensaje" name="mensaje" rows="5"></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar Consulta</button>
            </form>
        </section>
    </main>
</body>
</html>
